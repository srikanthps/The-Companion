<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 18px;
      line-height: 1.8;
      color: #333;
      background-color: #ffffff;
    }

    img {
      width: 100%;
    }
    
    .main-content {
      min-height: calc(100vh - 120px);
      padding: 3rem 1rem;
      max-width: 100%;
    }

    .main-content h1,
    .main-content h2,
    .main-content h3,
    .main-content h4,
    .main-content h5,
    .main-content h6,
    .main-content p,
    .main-content ul,
    .main-content ol,
    .main-content blockquote,
    .main-content table,
    .main-content pre {
      max-width: 90vw;
      margin-left: auto;
      margin-right: auto;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      line-height: 1.3;
      margin-top: 1em;
      margin-bottom: 0.8em;
      color: #000;
    }

    h1 {
      font-size: 3.5em;
    }

    h2 {
      font-size: 3em;
    }

    h3 {
      font-size: 2.5em;
    }

    h4 {
      font-size: 2.2em;
    }

    h5 {
      font-size: 2em;
    }

    h6 {
      font-size: 1.8em;
    }

    p {
      font-size: 1.3em;
      margin-bottom: 1.5em;
      text-align: justify;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul, ol {
      font-size: 1.3em;
      margin-bottom: 1.5em;
      margin-left: 2em;
    }

    li {
      margin-bottom: 0.8em;
    }

    blockquote {
      font-size: 1.2em;
      font-style: italic;
      margin-left: 2em;
      padding-left: 1em;
      border-left: 4px solid #0066cc;
      color: #555;
    }

    code {
      background-color: #f5f5f5;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.95em;
    }

    pre {
      background-color: #f5f5f5;
      padding: 1.5em;
      border-radius: 5px;
      overflow-x: auto;
      font-size: 1.1em;
      margin-bottom: 1.5em;
    }

    pre code {
      background-color: transparent;
      padding: 0;
    }

    @media screen and (min-width: 64em) {
      .main-content {
        padding: 4rem 2rem;
      }

      .main-content h1,
      .main-content h2,
      .main-content h3,
      .main-content h4,
      .main-content h5,
      .main-content h6,
      .main-content p,
      .main-content ul,
      .main-content ol,
      .main-content blockquote,
      .main-content table,
      .main-content pre {
        max-width: 80vw;
      }
    }

    .site-footer {
      padding: 2rem 1rem;
      border-top: 1px solid #ddd;
      color: #777;
      font-size: 0.85em;
      text-align: center;
      background-color: #f9f9f9;
      margin-top: 2rem;
    }

    .site-footer a {
      color: #0066cc;
    }
  </style>
  <title>{{ page.title | default: site.title | default: 'Stories and Novels' }}</title>
</head>
<body>
  <main id="content" class="main-content" role="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Stories written by Srikanth Shreenivas, and assisted by AI tools</p>
  </footer>
</body>
</html>
